apiVersion: v1
kind: Namespace
metadata:
  name: test-app-nginx
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-web
  namespace: test-app-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: echo-web
  template:
    metadata:
      labels:
        app: echo-web
    spec:
      containers:
        - name: echo-web
          image: hashicorp/http-echo:1.0.0
          args:
            - "-text=web-ok"
          ports:
            - containerPort: 5678
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-api
  namespace: test-app-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: echo-api
  template:
    metadata:
      labels:
        app: echo-api
    spec:
      containers:
        - name: echo-api
          image: hashicorp/http-echo:1.0.0
          args:
            - "-text=api-ok"
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: echo-web
  namespace: test-app-nginx
spec:
  selector:
    app: echo-web
  ports:
    - port: 80
      targetPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: echo-api
  namespace: test-app-nginx
spec:
  selector:
    app: echo-api
  ports:
    - port: 80
      targetPort: 5678
