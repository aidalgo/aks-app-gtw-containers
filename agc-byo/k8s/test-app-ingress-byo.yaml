---
apiVersion: v1
kind: Namespace
metadata:
  name: test-app-ingress-byo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-server
  namespace: test-app-ingress-byo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: echo-server
  template:
    metadata:
      labels:
        app: echo-server
    spec:
      containers:
        - name: echo-server
          image: ealen/echo-server:latest
          ports:
            - containerPort: 80
          env:
            - name: PORT
              value: "80"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: echo-server
  namespace: test-app-ingress-byo
spec:
  selector:
    app: echo-server
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: echo-ingress
  namespace: test-app-ingress-byo
  annotations:
    alb.networking.azure.io/alb-id: __ALB_ID__
    alb.networking.azure.io/alb-frontend: __INGRESS_FRONTEND_NAME__
spec:
  ingressClassName: azure-alb-external
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: echo-server
                port:
                  number: 80
