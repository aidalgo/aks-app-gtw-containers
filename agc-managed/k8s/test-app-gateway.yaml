---
apiVersion: v1
kind: Namespace
metadata:
  name: test-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-server
  namespace: test-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: echo-server
  template:
    metadata:
      labels:
        app: echo-server
    spec:
      containers:
        - name: echo-server
          image: ealen/echo-server:latest
          ports:
            - containerPort: 80
          env:
            - name: PORT
              value: "80"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: echo-server
  namespace: test-app
spec:
  selector:
    app: echo-server
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
# ApplicationLoadBalancer CR tells the ALB controller which delegated subnet
# to use for the AGC frontend. __AGC_SUBNET_ID__ is injected by deploy.sh.
apiVersion: alb.networking.azure.io/v1
kind: ApplicationLoadBalancer
metadata:
  name: alb
  namespace: test-app
spec:
  associations:
    - __AGC_SUBNET_ID__
---
# Gateway API: Gateway + HTTPRoute.
# The 'azure-alb-external' GatewayClass is installed by the AKS add-on.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway
  namespace: test-app
  annotations:
    alb.networking.azure.io/alb-namespace: test-app
    alb.networking.azure.io/alb-name: alb
spec:
  gatewayClassName: azure-alb-external
  listeners:
    - name: http-listener
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-route
  namespace: test-app
spec:
  parentRefs:
    - name: gateway
      namespace: test-app
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: echo-server
          port: 80
